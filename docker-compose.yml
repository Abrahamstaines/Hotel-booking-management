services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "HotelBooking@2024"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "HotelBooking@2024" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./HotelBooking.API
      dockerfile: Dockerfile
    ports:
      - "5135:5135"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=HotelBookingDb;User Id=sa;Password=HotelBooking@2024;TrustServerCertificate=True;
      - Jwt__Key=HotelBookingSecretKey2024VerySecureKeyAtLeast32Chars!
      - Jwt__Issuer=HotelBookingAPI
      - Jwt__Audience=HotelBookingClient
      - Email__SmtpHost=smtp.gmail.com
      - Email__SmtpPort=587
      - Email__FromAddress=parikhmoksh081@gmail.com
      - Email__Username=parikhmoksh081@gmail.com
      - Email__Password=mqjohzvboetveqzo
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./hotel-booking-client
      dockerfile: Dockerfile
    ports:
      - "4000:80"
    depends_on:
      - api

volumes:
  sqldata:
