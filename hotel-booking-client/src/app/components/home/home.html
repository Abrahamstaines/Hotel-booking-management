<section class="hero-section d-flex align-items-center">
  <div class="container text-center text-white">
    <h1 class="display-3 fw-bold mb-3">Find Your Perfect Stay</h1>
    <p class="lead mb-5">Browse hotels, compare rooms, and book with confidence</p>

    <div class="search-box card p-4 mx-auto">
      <form (ngSubmit)="search()" class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label text-start d-block text-muted">Destination</label>
          <input type="text" class="form-control form-control-lg" placeholder="City name"
                 [(ngModel)]="city" name="city">
        </div>
        <div class="col-md-3">
          <label class="form-label text-start d-block text-muted">Check-in</label>
          <input type="date" class="form-control form-control-lg"
                 [(ngModel)]="checkIn" name="checkIn">
        </div>
        <div class="col-md-3">
          <label class="form-label text-start d-block text-muted">Check-out</label>
          <input type="date" class="form-control form-control-lg"
                 [(ngModel)]="checkOut" name="checkOut">
        </div>
        <div class="col-md-1">
          <label class="form-label text-start d-block text-muted">Guests</label>
          <input type="number" class="form-control form-control-lg" min="1" max="10"
                 [(ngModel)]="guests" name="guests">
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-search me-1"></i> Search
          </button>
        </div>
      </form>
    </div>
  </div>
</section>

<section class="container py-5">
  <h2 class="text-center mb-4">Why Book With Us</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card h-100 text-center border-0 shadow-sm p-4">
        <i class="bi bi-shield-check fs-1 text-primary mb-3"></i>
        <h5>Secure Booking</h5>
        <p class="text-muted">Your payments and personal data are always protected</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 text-center border-0 shadow-sm p-4">
        <i class="bi bi-tags fs-1 text-primary mb-3"></i>
        <h5>Best Prices</h5>
        <p class="text-muted">Use promo codes and seasonal offers for great deals</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 text-center border-0 shadow-sm p-4">
        <i class="bi bi-star fs-1 text-primary mb-3"></i>
        <h5>Top Hotels</h5>
        <p class="text-muted">Curated selection of the finest hotels worldwide</p>
      </div>
    </div>
  </div>
</section>
